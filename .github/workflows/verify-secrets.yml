name: Verify Secrets

on:
  workflow_dispatch:  # 手动触发

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check required secrets
        run: |
          echo "🔐 Verifying secrets..."
          
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            echo "✅ JWT_SECRET is configured"
            echo "   Length: ${#JWT_SECRET} characters"
          else
            echo "❌ JWT_SECRET is missing"
            exit 1
          fi
          
          if [ -n "${{ secrets.DB_PASSWORD }}" ]; then
            echo "✅ DB_PASSWORD is configured"
          else
            echo "❌ DB_PASSWORD is missing"
            exit 1
          fi
          
          echo ""
          echo "✅ All required secrets are configured!"
